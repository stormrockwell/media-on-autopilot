name: Feature request
description: Suggest an idea or improvement for Media on Autopilot.
labels: [ enhancement ]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the media-library pain point you are hitting.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like Media on Autopilot to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
