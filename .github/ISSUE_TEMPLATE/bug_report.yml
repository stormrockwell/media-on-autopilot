name: Bug report
description: Something in Media on Autopilot is not working as expected.
labels: [ bug ]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including steps to reproduce.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Media on Autopilot version
      placeholder: e.g. 0.12.0
    validations:
      required: true
  - type: input
    id: wp-version
    attributes:
      label: WordPress version
      placeholder: e.g. 7.0
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.3
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Active CDN provider, AI provider, error logs, screenshots.
